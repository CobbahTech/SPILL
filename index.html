<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spill</title>
  <link rel="stylesheet" href="intro.css">
</head>
<body>
  <div id="intro-screen">
    <div class="intro-content">
      <!-- Logo -->
      <img src="images/spill-logo.jpeg" alt="Spill Logo" class="logo">

      <!-- Main heading -->
      <h1>Spill</h1>
      
      <!-- Description -->
      <p>
        Spill is a safe, anonymous space where you can say what you can’t say anywhere else.<br>
        No names. No faces. Just spills.
      </p>

      <p class="warning">
        But remember, freedom comes with responsibility.<br>
        Think before you spill.
      </p>

      <!-- Buttons -->
      <div class="intro-buttons">
        <button id="enter-btn">Enter the Room</button>
        <button id="leave-btn">Leave</button>
      </div>
    </div>
  </div>

  <script src="intro.js"></script>
</body>
</html>
