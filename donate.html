<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spill - Donate</title>
  <link rel="stylesheet" href="intro.css">
</head>

<body class="intro-active">

  <div id="intro-screen">
    <div class="intro-content">

      <!-- Logo -->
      <img src="images/spill-logo.jpeg" alt="Spill Logo" class="logo">

      <!-- Title -->
      <h1>Support Spill Community</h1>

      <!-- Message -->
      <p>
        Thank you for helping support the <strong>Spill</strong> community!<br><br>
        Your contributions help us maintain and improve the site.<br><br>
        Click below to donate using Mobile Money.
      </p>

      <!-- Buttons -->
      <div class="intro-buttons">
        <button id="donate-btn">Donate ₵1</button>
        <button id="leave-btn" onclick="window.location.href='spill.html'">← Back</button>
      </div>

    </div>
  </div>

  <!-- Paystack Script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <!-- Donation Script -->
  <script>
    const donateBtn = document.getElementById("donate-btn");

    donateBtn.addEventListener("click", () => {

      let handler = PaystackPop.setup({
        key: "pk_test_545538f0a73ef3bc85343502fac60608e1743edb", // YOUR PUBLIC KEY
        email: "test@email.com", // replace later with real user email
        amount: 100, // ₵1 in pesewas
        currency: "GHS",
        channels: ['mobile_money'], // MoMo only

        callback: function(response) {
          alert("✅ Donation successful! Ref: " + response.reference);
        },

        onClose: function() {
          alert("❌ Payment cancelled");
        }
      });

      handler.openIframe();
    });
  </script>

</body>
</html>
