<!DOCTYPE html>
<html lang="en">

  <title>Spill - Donate</title>
  <link rel="stylesheet" href="intro.css">

<body class="intro-active">

  <div id="intro-screen">

      <!-- Logo -->
      <img src="images/spill-logo.jpeg" alt="Spill Logo" class="logo">

      <!-- Title -->

    </div>
